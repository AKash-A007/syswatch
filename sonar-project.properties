sonar.projectKey=AKash-A007_syswatch
sonar.organization=akash-a007

# ── Source & Tests ────────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.11

# ── Coverage report (generated by pytest-cov) ─────────────────────────────────
sonar.python.coverage.reportPaths=coverage.xml

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/venv/**,\
  **/__pycache__/**,\
  **/dist/**,\
  **/build/**,\
  **/*.spec,\
  **/resources/**

sonar.test.exclusions=tests/**

# ── Encoding ──────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
