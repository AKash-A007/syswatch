[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum coverage threshold — CI will fail if below this
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=70

markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (requires FastAPI server)
    gui: GUI tests (requires Qt display)
    slow: Slow tests (skipped in quick mode)
