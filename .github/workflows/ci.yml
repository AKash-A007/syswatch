name: CI

on:
  push:
    branches: ["main", "dev", "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint with Ruff
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff linter
        run: ruff check src/ tests/

  # ─────────────────────────────────────────
  # Job 2: Format check with Black
  # ─────────────────────────────────────────
  format:
    name: 🎨 Format Check (black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run black format check
        run: black --check src/ tests/

  # ─────────────────────────────────────────
  # Job 3: Tests + Coverage
  # ─────────────────────────────────────────
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint, format]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          # Install headless Qt for GUI tests
          sudo apt-get update -qq
          sudo apt-get install -y libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xkb1 \
            libxkbcommon-x11-0 xvfb

      - name: Run tests with coverage
        env:
          DISPLAY: ":99.0"
          QT_QPA_PLATFORM: "offscreen"
        run: |
          xvfb-run --auto-servernum pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: syswatch-coverage
          fail_ci_if_error: false

  # ─────────────────────────────────────────
  # Job 4: Integration Tests
  # ─────────────────────────────────────────
  integration:
    name: 🔗 Integration Tests (FastAPI)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short
